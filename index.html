<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoAgent Vetrina</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
  </style>
</head>
<body>
  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang') || 'it';
    var persona = params.get('persona') || '';
    var mode = params.get('mode') || '';
    var open = params.get('open') || '';
    var apiBase = params.get('api') || 'https://infoagent-ombteam-vetrina.onrender.com';
    var apiUrl = apiBase.replace(/\/+$/, '');
    document.documentElement.lang = lang;
    var s = document.createElement('script');
    s.src = 'embed.js';
    s.setAttribute('data-api', apiUrl);
    s.setAttribute('data-title', 'InfoAgent');
    s.setAttribute('data-subtitle', 'InfoAgent Vetrina');
    s.setAttribute('data-placeholder', lang === 'en' ? 'Type a message...' : 'Scrivi un messaggio...');
    s.setAttribute('data-color', '#2563eb');
    s.setAttribute('data-position', 'right');
    s.setAttribute('data-welcome', lang === 'en'
      ? 'Hi! How can I help you? I can give you information or prepare a personalized proposal for you.'
      : 'Ciao! Come posso aiutarti? Posso darti informazioni o preparare un prospetto personalizzato per te.');
    s.setAttribute('data-welcome-chips', lang === 'en'
      ? '["Who are you?","What do you offer?","Prepare a proposal for me"]'
      : '["Chi siete?","Cosa offrite?","Prepara un prospetto per me"]');
    s.setAttribute('data-lang', lang);
    if (persona) s.setAttribute('data-persona', persona);
    if (mode) s.setAttribute('data-mode', mode);
    if (open) s.setAttribute('data-open', open);
    // No data-theme: uses base UI (header + chat, no sidebar)

    document.body.appendChild(s);

    // Force embedded dimensions after embed.js creates the widget
    if (mode === 'embedded') {
      var observer = new MutationObserver(function() {
        var panel = document.querySelector('[id$="-panel"]');
        var bubble = document.querySelector('[id$="-bubble"]');
        if (panel) {
          panel.style.cssText = 'position: relative !important; width: 100% !important; height: 100% !important; max-width: none !important; max-height: none !important; border-radius: 0 !important; box-shadow: none !important; display: flex !important; bottom: auto !important; right: auto !important; top: auto !important; left: auto !important; transform: none !important;';
          if (bubble) bubble.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
  })();
  </script>
</body>
</html>
